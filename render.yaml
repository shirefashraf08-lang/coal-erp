services:
  - type: web
    name: coal-erp-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coal-erp-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5000

databases:
  - name: coal-erp-db
    plan: free
    databaseName: coalerp
    user: coaladmin